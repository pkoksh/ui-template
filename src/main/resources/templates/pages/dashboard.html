<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/common :: common-head}"></th:block>
    <title>대시보드</title>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen">
    <div class="p-6">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-2xl font-bold text-gray-800 dark:text-gray-200">대시보드</h3>
            <button id="refresh-stats" class="bg-[#2563EB] hover:bg-[#2563EB]/80 text-white px-5 py-2.5 rounded-xl flex items-center space-x-2 shadow-sm transition-all duration-200 hover:shadow-md">
                <i class='bx bx-refresh text-lg'></i>
                <span class="font-medium">통계 새로고침</span>
            </button>
        </div>

        <!-- 통계 카드들 -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow">
                <div class="flex items-center">
                    <div class="p-2 bg-blue-100 dark:bg-blue-900 rounded-lg">
                        <svg class="w-6 h-6 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                        </svg>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm font-medium text-gray-600 dark:text-gray-400">활성 사용자</p>
                        <p id="stat-users" class="text-2xl font-semibold text-gray-900 dark:text-gray-100">-</p>
                    </div>
                </div>
            </div>

            <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow">
                <div class="flex items-center">
                    <div class="p-2 bg-green-100 dark:bg-green-900 rounded-lg">
                        <svg class="w-6 h-6 text-green-600 dark:text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm font-medium text-gray-600 dark:text-gray-400">활성 그룹</p>
                        <p id="stat-groups" class="text-2xl font-semibold text-gray-900 dark:text-gray-100">-</p>
                    </div>
                </div>
            </div>

            <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow">
                <div class="flex items-center">
                    <div class="p-2 bg-yellow-100 dark:bg-yellow-900 rounded-lg">
                        <svg class="w-6 h-6 text-yellow-600 dark:text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm font-medium text-gray-600 dark:text-gray-400">활성 메뉴</p>
                        <p id="stat-menus" class="text-2xl font-semibold text-gray-900 dark:text-gray-100">-</p>
                    </div>
                </div>
            </div>

            <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow">
                <div class="flex items-center">
                    <div class="p-2 bg-red-100 dark:bg-red-900 rounded-lg">
                        <svg class="w-6 h-6 text-red-600 dark:text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.192 2.5 1.732 2.5z"></path>
                        </svg>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm font-medium text-gray-600 dark:text-gray-400">공지사항</p>
                        <p id="stat-notices" class="text-2xl font-semibold text-gray-900 dark:text-gray-100">-</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 최근 활동 -->
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow">
            <div class="px-6 py-4 border-b dark:border-gray-700">
                <h4 class="text-lg font-medium text-gray-900 dark:text-gray-100">최근 공지사항</h4>
            </div>
            <div class="p-6">
                <div class="space-y-4" id="recent-activities">
                    <div class="flex items-center space-x-3">
                        <div class="w-2 h-2 bg-blue-400 rounded-full"></div>
                        <p class="text-sm text-gray-600 dark:text-gray-400">프로젝트 A의 설계 문서가 업데이트되었습니다.</p>
                        <span class="text-xs text-gray-400">2시간 전</span>
                    </div>
                    <div class="flex items-center space-x-3">
                        <div class="w-2 h-2 bg-green-400 rounded-full"></div>
                        <p class="text-sm text-gray-600 dark:text-gray-400">업무 #1234가 완료되었습니다.</p>
                        <span class="text-xs text-gray-400">4시간 전</span>
                    </div>
                    <div class="flex items-center space-x-3">
                        <div class="w-2 h-2 bg-yellow-400 rounded-full"></div>
                        <p class="text-sm text-gray-600 dark:text-gray-400">새로운 팀 멤버가 추가되었습니다.</p>
                        <span class="text-xs text-gray-400">1일 전</span>
                    </div>
                </div>
                <div class="text-center text-sm text-gray-500 dark:text-gray-400 mt-4">
                    <p>마지막 업데이트: <span id="last-updated">-</span></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 대시보드 통계 — /api/dashboard/stats 실데이터 (조회 전용 도메인 본보기)

        // 통계 데이터 로드
        async function loadStats() {
            try {
                // apiGet은 표준 ApiResponse 바디({success,message,data})를 반환
                const response = await apiGet('/api/dashboard/stats');
                updateUI(response.data);
            } catch (error) {
                console.error('통계 데이터 로드 실패:', error);
            }
        }

        // UI 업데이트
        function updateUI(stats) {
            const elements = {
                'stat-users': stats.userCount,
                'stat-groups': stats.groupCount,
                'stat-menus': stats.menuCount,
                'stat-notices': stats.noticeCount
            };

            for (const [id, value] of Object.entries(elements)) {
                const element = document.getElementById(id);
                if (element) {
                    element.textContent = Number(value).toLocaleString();
                }
            }

            renderRecentNotices(stats.recentNotices || []);

            const lastUpdated = document.getElementById('last-updated');
            if (lastUpdated) {
                lastUpdated.textContent = new Date().toLocaleTimeString();
            }
        }

        // 최근 공지 목록 렌더링 (XSS 방지를 위해 textContent만 사용)
        function renderRecentNotices(notices) {
            const container = document.getElementById('recent-activities');
            container.innerHTML = '';

            if (notices.length === 0) {
                const empty = document.createElement('p');
                empty.className = 'text-sm text-gray-400 text-center py-2';
                empty.textContent = '등록된 공지사항이 없습니다.';
                container.appendChild(empty);
                return;
            }

            notices.forEach(function(notice) {
                const row = document.createElement('div');
                row.className = 'flex items-center space-x-3';

                const dot = document.createElement('div');
                dot.className = 'w-2 h-2 rounded-full flex-shrink-0 ' + (notice.pinned ? 'bg-red-400' : 'bg-blue-400');

                const title = document.createElement('p');
                title.className = 'text-sm text-gray-600 dark:text-gray-400 flex-1 truncate';
                title.textContent = notice.title;

                const meta = document.createElement('span');
                meta.className = 'text-xs text-gray-400 flex-shrink-0';
                meta.textContent = (notice.authorName || '') + ' · ' + formatDate(notice.createdAt);

                row.appendChild(dot);
                row.appendChild(title);
                row.appendChild(meta);
                container.appendChild(row);
            });
        }

        // 이벤트 리스너
        document.getElementById('refresh-stats').addEventListener('click', loadStats);

        // 페이지 로드 시 초기화
        document.addEventListener('DOMContentLoaded', loadStats);

        // 탭 닫기 전 셸(tabs.js)이 호출 — 조회 전용 페이지라 닫기 진행
        window.onPageClose = function() {
            return true;
        };
    </script>
</body>
</html>
