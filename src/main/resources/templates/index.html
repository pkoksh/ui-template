<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/common :: common-head}"></th:block>
    
    <title th:text="${systemName}">업무시스템</title>
    
    <!-- 파비콘 -->
    <link rel="icon" type="image/svg+xml" href="/assets/favicon/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/favicon-180x180.png">
    <meta name="theme-color" content="#3B82F6">
    
    <!-- 추가 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    
    <!-- LiveReload 스크립트 (개발 환경에서만) -->
    <script th:if="${isDevelopment}">
        if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
            document.write('<script src="http://localhost:35729/livereload.js"><\/script>');
        }
    </script>
    
    <!-- 시스템 정보 및 설정을 JavaScript 전역 변수로 제공 -->
    <script th:inline="javascript">
        const now = Date.now();
        // 개발 환경에서 JS 파일 캐시 무효화를 위한 동적 버전
        window.jsVersion = /*[[${jsVersion}]]*/ now;
        
        // 시스템 정보
        window.systemInfo = {
            name: /*[[${systemName}]]*/ '업무시스템',
            version: /*[[${version}]]*/ '1.0.0',
            isDevelopment: /*[[${isDevelopment}]]*/ false
        };
        
        // 현재 사용자 정보
        // role 컬럼이 group_id 로 변경됨에 따라 groupId 사용
        window.currentUser = {
            name: /*[[${currentUser != null ? currentUser.name : '사용자'}]]*/ '사용자',
            groupId: /*[[${currentUser != null ? currentUser.groupId : 'USER'}]]*/ 'USER',
            isAuthenticated: /*[[${currentUser != null}]]*/ false
        };
    </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 h-screen overflow-hidden transition-colors duration-300">
    <!-- 메인 컨테이너 -->
    <div class="flex h-full">
        <!-- 사이드바 -->
        <aside id="sidebar" class="sidebar-transition bg-white dark:bg-gray-800 shadow-lg w-64 flex-shrink-0 transform -translate-x-full lg:translate-x-0 fixed lg:relative h-full z-20 border-r border-gray-200 dark:border-gray-700 flex flex-col">
            <div class="px-4 py-4">
                <div class="flex items-center justify-between mb-3">
                    <h1 class="text-xl font-bold text-gray-800 dark:text-gray-200" th:text="${systemName}">업무시스템</h1>
                </div>
                
                <!-- 전체 아코디언 제어 버튼 -->
                <div class="flex space-x-2">
                    <button id="expand-all" class="flex-1 px-3 py-2 text-xs bg-blue-500 hover:bg-blue-600 text-white rounded-lg flex items-center justify-center space-x-1">
                        <i class='bx bx-chevron-down text-xs'></i>
                        <span>전체 펼치기</span>
                    </button>
                    <button id="collapse-all" class="flex-1 px-3 py-2 text-xs bg-gray-500 hover:bg-gray-600 text-white rounded-lg flex items-center justify-center space-x-1">
                        <i class='bx bx-chevron-up text-xs'></i>
                        <span>전체 접기</span>
                    </button>
                </div>
            </div>
            
            <!-- 메뉴 리스트 (동적 생성) — 메뉴가 길어지면 이 영역만 스크롤 -->
            <nav class="mt-4 flex-1 overflow-y-auto pb-4">
                <ul class="space-y-2 px-4">
                    <!-- 메뉴가 JavaScript로 동적 생성됩니다 -->
                </ul>
            </nav>
        </aside>

        <!-- 오버레이 (모바일에서 사이드바가 열렸을 때) -->
        <div id="overlay" class="fixed inset-0 bg-black bg-opacity-50 z-10 hidden lg:hidden"></div>

        <!-- 메인 컨텐츠 영역 -->
        <main class="main-content">
            <!-- 헤더 -->
            <header class="bg-white dark:bg-gray-800 shadow-sm border-b border-gray-200 dark:border-gray-700 px-4 py-4 flex items-center justify-between flex-shrink-0">
                <div class="flex items-center flex-1 max-w-md">
                    <!-- 모바일 메뉴 버튼 -->
                    <button id="menu-toggle" class="lg:hidden mr-4 p-2 rounded-md hover:bg-gray-100 dark:hover:bg-gray-700">
                        <i class='bx bx-menu text-xl text-gray-600 dark:text-gray-300'></i>
                    </button>
                    
                    <!-- 메뉴 검색 -->
                    <div class="relative flex-1">
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class='bx bx-search text-gray-400 dark:text-gray-500'></i>
                            </div>
                            <input 
                                id="menu-search" 
                                type="text" 
                                placeholder="메뉴 검색... (Ctrl+K)" 
                                class="w-full pl-10 pr-4 py-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 rounded-lg focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-400 focus:border-transparent text-sm placeholder-gray-500 dark:placeholder-gray-400"
                                autocomplete="off"
                            >
                        </div>
                        
                        <!-- 검색 결과 드롭다운 -->
                        <div id="search-results" class="absolute top-full left-0 right-0 mt-1 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-lg z-50 hidden max-h-60 overflow-y-auto">
                            <!-- 검색 결과가 여기에 동적으로 추가됩니다 -->
                        </div>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <!-- 테마 전환 스위치 -->
                    <div class="flex items-center space-x-2" title="라이트/다크 테마 전환">
                        <span class="text-sm text-gray-600 dark:text-gray-300 select-none">☀️</span>
                        <div class="relative">
                            <input type="checkbox" id="theme-toggle" class="sr-only">
                            <label for="theme-toggle" class="flex items-center cursor-pointer">
                                <div class="relative">
                                    <div class="w-11 h-6 bg-gray-200 dark:bg-gray-700 rounded-full shadow-inner transition-colors duration-300"></div>
                                    <div id="theme-switch-dot" class="absolute w-4 h-4 bg-white rounded-full shadow-md top-1 left-1 transition-transform duration-300 transform"></div>
                                </div>
                            </label>
                        </div>
                        <span class="text-sm text-gray-600 dark:text-gray-300 select-none">🌙</span>
                    </div>
                    
                    <!-- 탭 개수 표시 -->
                    <div id="tab-count-display" class="hidden lg:flex items-center bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg px-3 py-2">
                        <div class="flex items-center space-x-2">
                            <i class='bx bx-tab text-gray-500 dark:text-gray-400 text-base'></i>
                            <div class="flex items-center space-x-1">
                                <span class="text-sm text-gray-600 dark:text-gray-400">열린 탭</span>
                                <span id="tab-count" class="inline-flex items-center justify-center min-w-[24px] h-5 px-2 bg-blue-500 text-white text-xs font-bold rounded-full">0</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 사용자 메뉴 -->
                    <div class="relative">
                        <button id="userMenuButton" class="flex items-center space-x-2 text-gray-600 dark:text-gray-300 hover:text-gray-800 dark:hover:text-gray-100 p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                            <i class='bx bx-user-circle text-xl'></i>
                            <span id="currentUserName" class="text-sm font-medium hidden lg:block" th:text="${currentUser != null ? currentUser.name : '사용자'}">사용자</span>
                            <i class='bx bx-chevron-down text-xs'></i>
                        </button>
                        
                        <!-- 사용자 드롭다운 메뉴 -->
                        <div id="userDropdown" class="absolute right-0 top-full mt-1 w-48 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-lg z-50 hidden">
                            <div class="py-2">
                                <div class="px-4 py-2 border-b border-gray-100 dark:border-gray-700">
                                    <div class="text-sm font-medium text-gray-800 dark:text-gray-200" id="userDropdownName" th:text="${currentUser != null ? currentUser.name : '사용자명'}">사용자명</div>
                                    <div class="text-xs text-gray-500 dark:text-gray-400" id="userDropdownRole" th:text="${currentUser != null ? currentUser.groupName : '역할'}">역할</div>
                                </div>
                                <a href="#" id="profileLink" class="flex items-center px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">
                                    <i class='bx bx-user mr-2'></i>
                                    프로필
                                </a>
                                <a href="#" id="settingsLink" class="flex items-center px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">
                                    <i class='bx bx-cog mr-2'></i>
                                    설정
                                </a>
                                <div class="border-t border-gray-100 dark:border-gray-700 mt-1 pt-1">
                                    <button id="logoutButton" class="flex items-center w-full px-4 py-2 text-sm text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/30">
                                        <i class='bx bx-log-out mr-2'></i>
                                        로그아웃
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- 컨텐츠 영역 -->
            <div class="flex-1 overflow-hidden min-h-0">
                <!-- 기본 환영 화면 -->
                <div id="welcome-screen" class="flex items-center justify-center h-full bg-white dark:bg-gray-900 transition-colors duration-300">
                    <div class="text-center">
                        <div class="text-6xl text-gray-300 dark:text-gray-600 mb-4">
                            <i class='bx bx-grid-alt'></i>
                        </div>
                        <h1 class="text-2xl font-semibold text-gray-800 dark:text-gray-200 mb-2" th:text="${systemName + '에 오신 것을 환영합니다'}">업무시스템에 오신 것을 환영합니다</h1>
                        <p class="text-gray-600 dark:text-gray-400">사이드바에서 메뉴를 선택하여 시작하세요.</p>
                        <div th:if="${isDevelopment}" class="mt-4 text-xs text-orange-500">
                            <i class='bx bx-info-circle'></i> 개발 모드 (버전: <span th:text="${version}">1.0.0</span>)
                        </div>
                    </div>
                </div>
                
                <!-- iframe 컨테이너 -->
                <div id="iframe-container" class="hidden h-full">
                    <!-- 탭별 iframe들이 여기에 동적으로 생성됩니다 -->
                </div>
                
                <!-- 로딩 표시 -->
                <div id="loading-indicator" class="hidden flex items-center justify-center h-full bg-white dark:bg-gray-900">
                    <div class="flex items-center">
                        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 dark:border-blue-400"></div>
                        <span class="ml-3 text-gray-600 dark:text-gray-300">페이지를 로드하는 중...</span>
                    </div>
                </div>
            </div>

            <!-- 탭 바 -->
            <div class="tab-footer">
                <!-- 왼쪽 스크롤 버튼 -->
                <button id="tab-scroll-left" class="absolute left-2 top-1/2 transform -translate-y-1/2 z-10 bg-white dark:bg-gray-800 bg-opacity-90 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full p-1 shadow-md border border-gray-200 dark:border-gray-600 opacity-0 transition-opacity duration-200">
                    <i class='bx bx-chevron-left text-gray-600 dark:text-gray-300'></i>
                </button>
                
                <!-- 탭 컨테이너 -->
                <div id="tab-container" class="overflow-hidden">
                    <div id="tab-bar" class="flex transition-transform duration-300 ease-in-out" style="transform: translateX(0px)">
                        <!-- 탭이 동적으로 생성됩니다 -->
                    </div>
                </div>
                
                <!-- 오른쪽 스크롤 버튼 -->
                <button id="tab-scroll-right" class="absolute right-2 top-1/2 transform -translate-y-1/2 z-10 bg-white dark:bg-gray-800 bg-opacity-90 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full p-1 shadow-md border border-gray-200 dark:border-gray-600 opacity-0 transition-opacity duration-200">
                    <i class='bx bx-chevron-right text-gray-600 dark:text-gray-300'></i>
                </button>
            </div>
        </main>
    </div>

    <!-- 페이지별 스크립트 -->
    <script th:src="@{'/assets/js/theme.js?v=' + ${jsVersion}}"></script>
    <script th:src="@{'/assets/js/page-loader.js?v=' + ${jsVersion}}"></script>
    <script th:src="@{'/assets/js/menu.js?v=' + ${jsVersion}}"></script>
    <script th:src="@{'/assets/js/tabs.js?v=' + ${jsVersion}}"></script>
    <script th:src="@{'/assets/js/search.js?v=' + ${jsVersion}}"></script>
    <script th:src="@{'/assets/js/script.js?v=' + ${jsVersion}}"></script>
</body>
</html>
